<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actualización de Datos | Dashboard</title>
    <link rel="icon" href="https://raw.githubusercontent.com/appsparavos-ops/DSC/fotos/update.png" type="image/png">

    <!-- Professional Styles -->
    <link rel="stylesheet" href="styles.css">

    <!-- Firebase SDK (Legacy version for compatibility) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
</head>

<body>
    <div class="container">
        <h1>Actualizador</h1>
        <h2>Gestión de Datos y Temporadas</h2>

        <!-- Sección: Login -->
        <div id="loginSection">
            <div class="input-group">
                <input type="email" id="emailInput" placeholder="Correo electrónico">
                <input type="password" id="passwordInput" placeholder="Contraseña">
            </div>
            <button id="loginButton">Iniciar Sesión</button>
            <p id="loginMessage"></p>
        </div>

        <!-- Sección: Menú Principal -->
        <div id="choiceSection" class="hidden">
            <button id="choiceUploadButton">Subir Registros de Temporada</button>
            <button id="choiceDeleteButton" class="btn-danger">Borrar Registro</button>
            <a href="../mantenimiento.html" class="btn-nav"
                style="display: inline-block; padding: 10px 20px; text-decoration: none; background: #4f46e5; color: white; border-radius: 8px; font-weight: 600; margin-top: 10px;">Menú</a>
            <button id="logoutButton">Cerrar Sesión</button>
        </div>

        <!-- Sección: Subida de CSV -->
        <div id="uploadSection" class="hidden">
            <h3 id="uploadTitle" style="margin-bottom: 20px; font-weight: 600;">Subir Registros</h3>
            <div class="input-group">
                <input type="text" id="seasonInput" placeholder="Temporada (ej. 2025)" class="hidden">
                <input type="file" id="csvFile"
                    accept=".csv, text/csv, application/csv, text/comma-separated-values, application/vnd.ms-excel">
            </div>
            <button id="performActionButton" disabled>Ejecutar Acción</button>
            <button id="backButton">Volver</button>
            <div id="message"></div>
        </div>

        <!-- Sección: Borrado de Registros -->
        <div id="deleteSection" class="hidden">
            <h3 style="margin-bottom: 20px; font-weight: 600;">Borrar Registro</h3>
            <div class="input-group">
                <input type="text" id="deleteSeasonInput" placeholder="Temporada (ej. 2025)">
                <input type="text" id="deleteDniInput" placeholder="DNI o Nombre del Jugador">
            </div>
            <button id="searchRecordsButton">Buscar Registros</button>
            <div id="recordsList"></div>
            <button id="backFromDeleteButton">Volver</button>
            <div id="deleteMessage"></div>
        </div>
    </div>

    <!-- Firebase Config -->
    <script src="firebase-config.js"></script>

    <!-- Modular Logic -->
    <script type="module" src="js/main.js"></script>
</body>

</html>
