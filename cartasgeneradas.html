<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Cartas - Defensor Sporting Club</title>
    <link rel="icon" href="https://raw.githubusercontent.com/appsparavos-ops/DSC/fotos/Defensor_SportingCuad.png" type="image/png">
    
    <!-- Librerías Externas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="firebase-config.js"></script>

    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #000000);
            min-height: 100vh;
            color: white;
            padding: 2rem 1rem;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .search-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 0.75rem 1rem;
            width: 100%;
            color: white;
            outline: none;
            transition: all 0.3s;
        }

        .search-input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #7c3aed;
            box-shadow: 0 0 15px rgba(124, 58, 237, 0.3);
        }

        .history-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px;
        }

        .history-table th {
            text-align: left;
            padding: 1rem;
            color: #94a3b8;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .history-table tr {
            background: rgba(255, 255, 255, 0.02);
            transition: all 0.2s;
        }

        .history-table tr:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: scale(1.005);
        }

        .history-table td {
            padding: 1rem;
        }

        .history-table td:first-child {
            border-radius: 12px 0 0 12px;
        }

        .history-table td:last-child {
            border-radius: 0 12px 12px 0;
        }

        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-did { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .badge-email { background: rgba(124, 58, 237, 0.2); color: #a78bfa; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

        .loading-spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #7c3aed;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-8">
            <div>
                <h1 class="text-3xl font-bold bg-gradient-to-r from-purple-400 to-indigo-400 bg-clip-text text-transparent">Historial de Constancias</h1>
                <p class="text-gray-400">Registro de todas las cartas PDF generadas</p>
            </div>
            
            <a href="mantenimiento.html" class="flex items-center px-4 py-2 rounded-xl bg-white/5 border border-white/10 hover:bg-white/10 transition-all">
                <svg class="h-5 w-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Volver a Mantenimiento
            </a>
        </div>

        <!-- content -->
        <div class="glass-card p-6">
            <!-- Search & Filters -->
            <div class="flex flex-col md:flex-row gap-4 mb-8">
                <div class="flex-1">
                    <input type="text" id="searchInput" placeholder="Buscar por nombre, DNI o usuario..." class="search-input">
                </div>
                <div class="md:w-48 text-right flex items-center justify-end text-sm text-gray-400">
                    Total: <span id="totalCount" class="font-bold text-white ml-2">0</span>
                </div>
            </div>

            <!-- Table -->
            <div class="overflow-x-auto">
                <table class="history-table">
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Nombre</th>
                            <th>DNI</th>
                            <th>Usuario</th>
                            <th>Dispositivo</th>
                        </tr>
                    </thead>
                    <tbody id="historyTableBody">
                        <tr>
                            <td colspan="5" class="text-center py-20">
                                <div class="flex flex-col items-center">
                                    <div class="loading-spinner mb-4"></div>
                                    <p class="text-gray-400">Cargando historial...</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Use global firebaseConfig if needed or import from firebase-config.js
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let fullHistory = [];

        // Auth Check
        auth.onAuthStateChanged(user => {
            if (user) {
                db.ref('admins/' + user.uid).once('value').then(snapshot => {
                    if (snapshot.exists()) {
                        loadHistory();
                    } else {
                        window.location.href = 'index.html';
                    }
                });
            } else {
                window.location.href = 'index.html';
            }
        });

        function loadHistory() {
            db.ref('cartas').orderByChild('fecha').once('value').then(snapshot => {
                const data = snapshot.val();
                if (data) {
                    fullHistory = Object.values(data).reverse(); // Newest first
                    renderHistory(fullHistory);
                    document.getElementById('totalCount').textContent = fullHistory.length;
                } else {
                    document.getElementById('historyTableBody').innerHTML = '<tr><td colspan="5" class="text-center py-10 text-gray-500">No hay registros de cartas generadas todavía.</td></tr>';
                }
            }).catch(err => {
                console.error(err);
                document.getElementById('historyTableBody').innerHTML = '<tr><td colspan="5" class="text-center py-10 text-red-400">Error al cargar el historial.</td></tr>';
            });
        }

        function renderHistory(items) {
            const tbody = document.getElementById('historyTableBody');
            tbody.innerHTML = '';

            items.forEach(item => {
                const tr = document.createElement('tr');
                const date = new Date(item.fecha);
                const formattedDate = date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                
                tr.innerHTML = `
                    <td class="whitespace-nowrap font-medium">${formattedDate}</td>
                    <td class="font-bold text-lg">${item.nombre}</td>
                    <td><span class="text-gray-300 font-mono">${item.dni}</span></td>
                    <td><span class="badge badge-email">${item.userEmail || 'Desconocido'}</span></td>
                    <td><span class="badge badge-did">${item.dispositivo ? item.dispositivo.split('-')[1] : 'N/A'}</span></td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Search Filter
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = fullHistory.filter(item => 
                item.nombre.toLowerCase().includes(term) || 
                item.dni.toLowerCase().includes(term) || 
                (item.userEmail && item.userEmail.toLowerCase().includes(term))
            );
            renderHistory(filtered);
            document.getElementById('totalCount').textContent = filtered.length;
        });
    </script>
</body>
</html>
