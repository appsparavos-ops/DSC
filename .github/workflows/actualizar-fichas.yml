name: Actualizar Fichas Médicas

on:
  schedule:
    # 9:00 AM Uruguay (12:00 UTC) - Lunes a Viernes
    # - cron: '58 12 * * 1-5'
    # 18:00 PM Uruguay (21:00 UTC) - Lunes a Viernes
    - cron: '28 20 * * 1-5'
  workflow_dispatch:
    # Permite ejecutarlo manualmente desde GitHub Actions

jobs:
  actualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Fuerza el uso de Node 24 y oculta avisos de depreciación
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Playwright y Chromium
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Ejecutar Actualizador de Fichas Médicas
        run: node .github/scripts/run-fichas.js
        env:
          FICHAS_URL: ${{ secrets.FICHAS_URL }}
