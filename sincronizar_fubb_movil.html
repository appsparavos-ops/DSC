<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sincronización FUBB (Móvil) - DSC</title>
    <link rel="icon" href="https://raw.githubusercontent.com/appsparavos-ops/DSC/fotos/Defensor_SportingCuad.png" type="image/png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="firebase-config.js"></script>

    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #000000);
            min-height: 100vh;
            color: white;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
        }
        select option {
            background-color: #1e1b4b;
            color: white;
        }
        .uninitialized { opacity: 0; }
    </style>
</head>
<body class="bg-black">

    <div class="p-4 max-w-lg mx-auto">
        <header class="mb-6">
            <div class="flex items-center gap-3 mb-4">
                <a href="mantenimiento.html" class="p-2 rounded-full hover:bg-white/10 transition-colors">
                    <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                    </svg>
                </a>
                <h1 class="text-xl font-bold bg-gradient-to-r from-orange-400 to-amber-400 bg-clip-text text-transparent">FUBB Sync Móvil</h1>
            </div>
            
            <div class="space-y-3">
                <select id="seasonSelect" class="w-full bg-indigo-950/40 border border-white/10 rounded-lg px-4 py-3 text-sm text-white focus:outline-none"></select>
                <select id="teamSelect" class="w-full bg-indigo-950/40 border border-white/10 rounded-lg px-4 py-3 text-sm text-white focus:outline-none">
                    <option value="">Selecciona equipo</option>
                </select>
                <select id="categorySelect" class="w-full bg-indigo-950/40 border border-white/10 rounded-lg px-4 py-3 text-sm text-white focus:outline-none">
                    <option value="">Selecciona categoría</option>
                </select>
            </div>
        </header>

        <section class="glass-card p-4 mb-6">
            <h2 class="text-sm font-bold mb-3 flex items-center gap-2">
                <svg class="h-4 w-4 text-orange-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
                </svg>
                Pegado de Tabla FUBB
            </h2>
            <p class="text-[10px] text-gray-400 mb-3">Copia toda la tabla en la web de FUBB y pégala aquí.</p>
            <textarea id="fubbDataInput" rows="5" 
                class="w-full bg-black/40 border border-white/10 rounded-xl p-3 text-xs text-orange-200 focus:outline-none focus:border-orange-500 mb-3"
                placeholder="Pega aquí el texto copiado..."></textarea>
            <button id="compareBtn" class="w-full py-3 bg-orange-600 hover:bg-orange-700 rounded-xl font-bold transition-all active:scale-95">
                Comparar y Sincronizar
            </button>
        </section>

        <div id="resultsContent" class="hidden space-y-6">
            <div class="glass-card p-4">
                <h3 class="text-xs font-bold text-red-400 mb-3 uppercase tracking-wider">Faltan en Firebase</h3>
                <div id="missingInFirebaseBody" class="space-y-2"></div>
            </div>

            <div class="glass-card p-4">
                <h3 class="text-xs font-bold text-blue-400 mb-3 uppercase tracking-wider">Faltan en FUBB</h3>
                <div id="missingInFubbBody" class="space-y-2"></div>
            </div>
        </div>

        <div id="noResultsState" class="glass-card p-8 text-center text-gray-500">
            <p class="text-sm">Selecciona una categoría y pega los datos para empezar.</p>
        </div>
    </div>

    <!-- Las mismas notificaciones de toast -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-50 transition-all duration-300 translate-y-24 opacity-0 pointer-events-none">
        <div class="bg-gray-900 text-white px-8 py-4 rounded-2xl shadow-2xl font-semibold flex items-center gap-3">
            <span id="toastText"></span>
        </div>
    </div>

    <!-- Usamos el mismo JS pero adaptamos la renderización si es necesario -->
    <script>
        // Sobrescribimos renderResults para formato móvil (cards en lugar de tabla)
        window.mobileView = true;
    </script>
    <script src="js/audit-logger.js"></script>
    <script src="js/sincronizar_fubb.js"></script>
</body>
</html>
