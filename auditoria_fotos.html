<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auditoría de Fotos - DSC</title>
    <link rel="icon" href="https://raw.githubusercontent.com/appsparavos-ops/DSC/fotos/Defensor_SportingCuad.png" type="image/png">

    <!-- Librerías Externas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="firebase-config.js"></script>

    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #000000);
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(147, 51, 234, 0.3);
            border-radius: 10px;
        }

        .progress-bar-fill {
            transition: width 0.3s ease-in-out;
        }

        .animate-pulse-subtle {
            animation: pulse-subtle 2s infinite ease-in-out;
        }

        @keyframes pulse-subtle {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
    </style>
</head>

<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row items-center justify-between mb-8 gap-6">
            <div class="flex items-center gap-4">
                <a href="mantenimiento.html" class="p-3 rounded-full bg-white/5 border border-white/10 hover:bg-white/10 transition-all group">
                    <svg class="h-6 w-6 text-gray-400 group-hover:text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                    </svg>
                </a>
                <div>
                    <h1 class="text-3xl font-bold bg-gradient-to-r from-purple-400 to-indigo-400 bg-clip-text text-transparent">Auditoría de Fotos</h1>
                    <p class="text-gray-400">Verifica la integridad visual del roster</p>
                </div>
            </div>

            <div class="flex items-center gap-3">
                <select id="seasonSelect" class="bg-white/5 border border-white/10 rounded-xl px-4 py-2 focus:outline-none focus:border-purple-500 transition-all text-white">
                    <!-- Dinámico -->
                </select>
                <button id="startAuditBtn" class="bg-purple-600 hover:bg-purple-700 text-white px-6 py-2 rounded-xl font-bold shadow-lg shadow-purple-600/20 transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                    Iniciar Auditoría
                </button>
            </div>
        </header>

        <!-- Stats Grid -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="glass-card p-6">
                <p class="text-gray-400 text-sm mb-1">Total Jugadores</p>
                <p id="statTotal" class="text-3xl font-bold">0</p>
            </div>
            <div class="glass-card p-6">
                <p class="text-gray-400 text-sm mb-1">Verificados</p>
                <p id="statVerified" class="text-3xl font-bold text-blue-400">0</p>
            </div>
            <div class="glass-card p-6">
                <p class="text-gray-400 text-sm mb-1">Con Foto</p>
                <p id="statWithPhoto" class="text-3xl font-bold text-green-400">0</p>
            </div>
            <div class="glass-card p-6 border-red-500/20">
                <p class="text-gray-400 text-sm mb-1">Sin Foto</p>
                <p id="statMissingPhoto" class="text-3xl font-bold text-red-400">0</p>
            </div>
        </div>

        <!-- Progress Bar -->
        <div id="progressContainer" class="hidden glass-card p-6 mb-8">
            <div class="flex justify-between mb-2 text-sm">
                <span id="progressLabel" class="text-gray-300 italic">Verificando...</span>
                <span id="progressPercent" class="font-bold text-purple-400">0%</span>
            </div>
            <div class="w-full bg-white/10 rounded-full h-3">
                <div id="progressBar" class="progress-bar-fill bg-gradient-to-r from-purple-500 to-indigo-500 h-3 rounded-full" style="width: 0%"></div>
            </div>
        </div>

        <!-- Results Table -->
        <div class="glass-card overflow-hidden flex flex-col min-h-[500px]">
            <div class="p-6 border-b border-white/10 flex flex-col md:flex-row justify-between items-center gap-4">
                <h2 class="text-xl font-bold flex items-center gap-2">
                    Reporte de Faltantes
                    <span id="missingCountBadge" class="hidden px-2 py-0.5 rounded-full bg-red-500/20 text-red-400 text-xs">...</span>
                </h2>
                <div class="flex gap-2 w-full md:w-auto">
                    <input type="text" id="tableFilter" placeholder="Filtrar por nombre, equipo..." class="bg-white/5 border border-white/10 rounded-xl px-4 py-2 focus:outline-none focus:border-purple-500 transition-all text-sm w-full md:w-64">
                    <button id="exportPdfBtn" disabled class="bg-white/5 border border-white/10 hover:bg-white/10 px-4 py-2 rounded-xl text-sm transition-all disabled:opacity-30">
                        Exportar PDF
                    </button>
                </div>
            </div>

            <div class="flex-grow overflow-auto custom-scrollbar">
                <table id="resultsTable" class="w-full text-left">
                    <thead class="bg-white/5 text-gray-400 text-sm sticky top-0 backdrop-blur-md">
                        <tr>
                            <th class="px-6 py-3 font-semibold">NOMBRE</th>
                            <th class="px-6 py-3 font-semibold">DNI</th>
                            <th class="px-6 py-3 font-semibold">EQUIPO</th>
                            <th class="px-6 py-3 font-semibold">CATEGORÍA</th>
                            <th class="px-6 py-3 font-semibold text-center">URL FOTO</th>
                        </tr>
                    </thead>
                    <tbody id="resultsBody" class="divide-y divide-white/5">
                        <tr>
                            <td colspan="5" class="px-6 py-20 text-center text-gray-500 italic font-light">
                                Inicia la auditoría para buscar jugadores sin foto.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Toast UI -->
    <div id="toastContainer" class="fixed bottom-8 right-8 flex flex-col gap-2 z-50"></div>

    <script src="js/audit-logger.js"></script>
    <script src="auditoria_fotos.js"></script>
</body>

</html>
