<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion de Jugadores</title>
    <link rel="icon" href="https://raw.githubusercontent.com/appsparavos-ops/DSC/fotos/Defensor_SportingCuad.png"
        type="image/png">

    <!-- Librerías Externas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Enlace a tu hoja de estilos CSS -->
    <link rel="stylesheet" href="styles.css">

    <!-- Ocultar contenido hasta que JS decida qué mostrar -->
    <style>
        .uninitialized #login-container,
        .uninitialized #main-container {
            visibility: hidden;
        }
    </style>

    <!-- jsPDF and html2canvas for PDF Generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
</head>

<body class="bg-blue-900 text-gray-800 uninitialized">

    <div id="login-container" class="min-h-screen flex items-center justify-center">
        <div class="max-w-md w-full bg-white p-8 rounded-xl shadow-md">
            <div class="text-center mb-6">
                <img src="https://raw.githubusercontent.com/appsparavos-ops/DSC/fotos/Defensor_Sporting.png"
                    alt="Logo del Club" class="h-20 w-auto mx-auto mb-4">
                <h1 class="text-2xl font-bold text-gray-800">Control de Acceso</h1>
                <p class="text-gray-500">Inicia sesión para continuar</p>
            </div>
            <form id="login-form">
                <div class="mb-4">
                    <label for="login-email" class="block text-sm font-medium text-gray-700">Correo Electrónico</label>
                    <input type="email" id="login-email" placeholder="tu@email.com"
                        class="mt-2 block w-full px-3 py-2 bg-white border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500"
                        required>
                </div>
                <div class="mb-6">
                    <label for="login-password" class="block text-sm font-medium text-gray-700">Contraseña</label>
                    <input type="password" id="login-password" placeholder="********"
                        class="mt-2 block w-full px-3 py-2 bg-white border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500"
                        required>
                </div>
                <div id="login-error-message" class="text-red-500 text-sm mb-4 hidden"></div>
                <button type="submit"
                    class="w-full justify-center py-2 px-4 border border-transparent rounded-lg shadow-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                    Ingresar
                </button>
            </form>
        </div>
    </div>

    <div id="main-container" style="display: none;">
        <div class="container mx-auto p-4 sm:p-6 md:p-8">

            <header class="flex justify-between items-center mb-6 p-4 no-print">
                <div>
                    <img src="https://raw.githubusercontent.com/appsparavos-ops/DSC/fotos/Defensor_Sporting.png"
                        alt="Logo del Club" class="h-12 sm:h-16 md:h-20 w-auto">
                </div>
                <div class="text-center px-2">
                    <h1 class="text-xl sm:text-2xl md:text-3xl font-bold text-white">Defensor Sporting Club</h1>
                    <p class="text-sm sm:text-base font-bold text-white mt-1">Gestión de Jugadores</p>
                </div>
                <div class="flex items-center gap-4">
                    <img src="https://raw.githubusercontent.com/appsparavos-ops/DSC/fotos/Defensor_Sporting.png"
                        alt="Logo del Club" class="h-12 sm:h-16 md:h-20 w-auto">
                </div>
            </header>

            <div id="main-content">
                <main>
                    <div id="searchToggleContainer" class="flex flex-wrap items-center justify-center gap-4 mb-4 no-print">
                        <button id="toggleSearchButton" type="button"
                            class="bg-blue-600 hover:bg-blue-700 text-white font-bold p-2 rounded-lg shadow-md focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500" title="Mostrar/Ocultar Búsqueda">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                            </svg>
                        </button>
                        <div id="actionButtonsContainer" class="flex flex-wrap gap-2 items-center justify-center">
                            <button id="expiringButton" type="button"
                                class="flex-shrink-0 p-2 border border-transparent rounded-lg shadow-sm font-medium text-white bg-amber-600 hover:bg-amber-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-amber-500" title="Vencimientos (Ficha Médica)">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7h16v13H4V7z M12 10.5v6 M9 13.5h6 M8 7V4h8v3"></path>
                                </svg>
                            </button>
                            <button id="resetButton" type="button"
                                class="flex-shrink-0 p-2 border border-gray-300 rounded-lg shadow-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500" title="Todos (Limpiar Filtros)">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
                                </svg>
                            </button>
                            <button id="printButton" type="button"
                                class="flex-shrink-0 p-2 border border-transparent rounded-lg shadow-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 hidden" title="Generar PDF">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 13h6"></path>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17h6"></path>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 3v5h5"></path>
                                </svg>
                            </button>
                            <button id="navToGestionNumeros" type="button"
                                class="hidden flex-shrink-0 p-2 border border-transparent rounded-lg shadow-sm font-medium text-white bg-purple-600 hover:bg-purple-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-purple-500" title="Mantenimiento">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                </svg>
                            </button>
                            <button id="logout-button" type="button"
                                class="flex-shrink-0 p-2 bg-red-600 hover:bg-red-700 text-white font-bold rounded-lg shadow-md focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500" title="Cerrar Sesión">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div id="searchBar" class="bg-white p-6 rounded-xl shadow-md mb-8 no-print">
                        <div class="flex flex-wrap gap-4 items-end">
                            <div class="flex-grow w-full sm:w-auto" style="min-width: 200px;">
                                <input type="text" id="nameSearchInput" list="name-suggestions"
                                    placeholder="Buscar por nombre..."
                                    class="mt-2 block w-full px-3 py-2 bg-white border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                                <datalist id="name-suggestions"></datalist>
                            </div>
                            <div class="flex-grow w-full sm:w-auto" style="min-width: 150px;">
                                <input type="text" id="dniSearchInput" list="dni-suggestions"
                                    placeholder="Buscar por DNI..."
                                    class="mt-2 block w-full px-3 py-2 bg-white border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                                <datalist id="dni-suggestions"></datalist>
                            </div>
                            <div class="flex-grow w-full sm:w-auto" style="min-width: 200px;">
                                <select id="categoryFilter"
                                    class="mt-2 block w-full px-3 py-2 bg-white border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                                    <option value="">Todas las categorías</option>
                                </select>
                            </div>
                            <div class="flex-grow w-full sm:w-auto" style="min-width: 200px;">
                                <select id="equipoFilter"
                                    class="mt-2 block w-full px-3 py-2 bg-white border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                                    <option value="">Todos los equipos</option>
                                </select>
                            </div>
                            <div class="flex-grow w-full sm:w-auto" style="min-width: 200px;">
                                <select id="seasonFilter"
                                    class="mt-2 block w-full px-3 py-2 bg-white border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                                    <option value="">Todas las temporadas</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div id="resultsArea" class="bg-white p-4 rounded-xl shadow-md">
                        <p id="message" class="text-center text-gray-500 py-16">Cargando datos...</p>
                        <div id="tableContainer" class="overflow-x-auto"></div>
                    </div>
                </main>
            </div>

            <div id="playerDetailView" class="hidden relative"></div>

            <footer class="text-center mt-12 text-sm text-gray-500 no-print">
                <p>Aplicación de Gestión de Jugadores &copy; 2026</p>
            </footer>
        </div>

        <div id="print-footer"></div>



        <!-- Modal de Opciones de PDF -->
        <div id="pdfOptionsModal" class="hidden fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full z-50 flex items-center justify-center">
            <div class="relative p-8 border w-96 shadow-lg rounded-xl bg-white">
                <div class="mt-3 text-center">
                    <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-blue-100 mb-4">
                        <svg class="h-6 w-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                        </svg>
                    </div>
                    <h3 class="text-xl leading-6 font-bold text-gray-900 mb-4">Opciones de PDF</h3>
                    <div class="mt-2 px-7 py-3">
                        <p class="text-sm text-gray-500">¿Desea incluir la columna de <strong>ESTADO LICENCIA</strong> en el informe?</p>
                    </div>
                    <div class="flex flex-col gap-3 mt-6">
                        <button id="pdfOptionYes" class="px-4 py-2 bg-blue-600 text-white text-base font-medium rounded-lg shadow-sm hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors">
                            SÍ (Incluir Estado)
                        </button>
                        <button id="pdfOptionNo" class="px-4 py-2 bg-gray-100 text-gray-800 text-base font-medium rounded-lg shadow-sm hover:bg-gray-200 focus:outline-none focus:ring-2 focus:ring-gray-300 transition-colors">
                            NO (Omitir Estado)
                        </button>
                        <button id="pdfOptionCancel" class="px-4 py-2 bg-white text-red-600 text-base font-medium rounded-lg border border-red-200 hover:bg-red-50 focus:outline-none focus:ring-2 focus:ring-red-500 transition-colors">
                            CANCELAR
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Enlace a tu archivo JavaScript -->
        <script src="app.js"></script>
    </div>

</body>

</html>
